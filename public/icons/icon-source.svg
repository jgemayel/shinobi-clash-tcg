<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#1f2a40"/>
      <stop offset="55%" stop-color="#0b1018"/>
      <stop offset="100%" stop-color="#04050a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ff9a33" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#ff6a00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#ffe4a6"/>
      <stop offset="35%" stop-color="#ffb347"/>
      <stop offset="70%" stop-color="#ff7a1a"/>
      <stop offset="100%" stop-color="#d94400"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a33" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#ff6a00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff9a33" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.55"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="inner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Diagonal hash pattern evoking card back -->
  <g opacity="0.055" stroke="#ff8c1a" stroke-width="1.2" fill="none">
    <path d="M-40 120 L560 -480 M-40 200 L560 -400 M-40 280 L560 -320 M-40 360 L560 -240 M-40 440 L560 -160 M-40 520 L560 -80 M-40 600 L560 0 M-40 680 L560 80 M-40 760 L560 160 M-40 840 L560 240 M-40 920 L560 320 M-40 1000 L560 400 M-40 1080 L560 480"/>
  </g>

  <!-- Outer glow halo -->
  <circle cx="256" cy="256" r="215" fill="url(#glow)"/>

  
  <!-- Card frame -->
  <rect x="42" y="42"
        width="428" height="428"
        rx="54" ry="54"
        fill="none" stroke="url(#frameGrad)" stroke-width="2.5"/>
  <rect x="52" y="52"
        width="408" height="408"
        rx="48" ry="48"
        fill="none" stroke="#ff8c1a" stroke-opacity="0.12" stroke-width="1"/>
  

  <!-- Konoha-inspired spiral -->
  <g filter="url(#shadow)">
    <path d="M 256.00,104.00 L 274.51,106.31 L 292.46,110.84 L 309.58,117.50 L 325.62,126.15 L 340.36,136.63 L 353.59,148.75 L 365.13,162.30 L 374.83,177.05 L 382.58,192.75 L 388.28,209.16 L 391.89,226.00 L 393.39,243.01 L 392.78,259.94 L 390.11,276.52 L 385.45,292.51 L 378.92,307.67 L 370.63,321.78 L 360.76,334.66 L 349.47,346.11 L 336.97,355.99 L 323.47,364.19 L 309.19,370.59 L 294.37,375.14 L 279.24,377.80 L 264.03,378.57 L 249.00,377.46 L 234.35,374.54 L 220.31,369.87 L 207.09,363.57 L 194.87,355.76 L 183.81,346.59 L 174.07,336.23 L 165.77,324.86 L 159.01,312.68 L 153.86,299.88 L 150.37,286.69 L 148.55,273.31 L 148.41,259.95 L 149.90,246.81 L 152.97,234.10 L 157.54,222.00 L 163.50,210.69 L 170.74,200.31 L 179.11,191.02 L 188.46,182.93 L 198.62,176.15 L 209.41,170.73 L 220.66,166.74 L 232.18,164.21 L 243.77,163.13 L 255.27,163.50 L 266.50,165.27 L 277.28,168.38 L 287.46,172.75 L 296.90,178.27 L 305.46,184.83 L 313.04,192.31 L 319.55,200.56 L 324.91,209.43 L 329.06,218.77 L 331.98,228.42 L 333.66,238.21 L 334.09,248.00 L 333.32,257.62 L 331.38,266.93 L 328.34,275.79 L 324.29,284.08 L 319.31,291.67 L 313.51,298.48 L 307.02,304.41 L 299.95,309.41 L 292.44,313.41 L 284.61,316.40 L 276.62,318.35 L 268.58,319.26 L 260.64,319.16 L 252.91,318.09 L 245.51,316.09 L 238.56,313.23 L 232.14,309.59 L 226.34,305.26 L 221.24,300.33 L 216.89,294.91 L 213.33,289.10 L 210.59,283.01 L 208.69,276.77 L 207.62,270.47 L 207.36,264.23 L 207.88,258.14 L 209.14,252.31 L 211.09,246.82 L 213.67,241.75 L 216.79,237.17 L 220.38,233.13 L 224.35,229.68 L 228.62,226.84 L 233.09,224.64 L 237.68,223.09 L 242.30,222.17 L 246.86,221.87 L 251.27,222.16 L 255.48,223.00 L 259.41,224.35 L 263.00,226.14 L 266.21,228.32 L 269.00,230.82 L 271.33,233.57 L 273.19,236.50 L 274.58,239.53 L 275.50,242.60 L 275.97,245.63 L 276.00,248.56 L 275.62,251.34 L 274.89,253.92 L 273.83,256.23 L 272.51,258.26 L 270.98,259.97 L 269.30,261.35 L 267.52,262.37 L 265.71,263.05"
          stroke="url(#orange)"
          stroke-width="40"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>
  </g>

  <!-- Center dot highlight -->
  <circle cx="256" cy="256" r="6" fill="#fff7e0" opacity="0.92"/>

  <!-- Shuriken-card corner accents (top-left, bottom-right) -->
  
  <g fill="#ff8c1a" opacity="0.75">
    <path d="M 80 96 L 92 96 L 86 108 Z M 80 96 L 80 108 L 68 102 Z"/>
    <path d="M 432 416 L 420 416 L 426 404 Z M 432 416 L 432 404 L 444 410 Z"/>
  </g>
  
</svg>